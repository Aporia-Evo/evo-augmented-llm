# v16c: v16a source/basis asymmetry + amplified magnitude.
# Reduces the constant baseline in k_raw/q_raw from 1.0 to 0.15 and
# doubles the tanh amplitudes so perturbations dominate over the
# uniform-1/d pull of _positive_sum_normalize.
#
# v16a/v16b benchmark diagnosis (seeds 7/11/13):
#   - base     cosine 0.903  key_var 0.0037  query_var 0.0015
#   - v16a     cosine 0.912  key_var 0.0032  query_var 0.0012
#   - v16b     cosine 0.929  key_var 0.0012  query_var 0.0009
# Monotone collapse toward uniform. With baseline 1.0 dominating the
# tanh perturbations (ratio ~1:1), _positive_sum_normalize forces each
# entry toward 1/d_key ± small noise, which mathematically pins cosine
# near 1.0 regardless of gene values or selection pressure.
#
# v16c raises the ratio to ~13:1 so real shape variance can emerge.
# Crossing gains remain active (v16c is not v16b); only the magnitude
# of the raw k/q signal changes.
#
# Layer on top of base.yaml + key_value_memory.yaml + local.yaml.

run:
  variant: stateful_v6_delta_memory_v16c
  run_id_prefix: v16c-amp-magnitude
  generations: 18
  elite_top_k: 3

evolution:
  population_size: 48
